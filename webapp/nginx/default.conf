server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.html;
    location /schema-matching/ {
        include  /etc/nginx/mime.types;
        try_files $uri $uri/ /index.html;
    }
    location /schema-matching/generateData {
      proxy_pass http://flask-server:5000/generateData;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Host $host;
      proxy_redirect off;
    }
    location /schema-matching/generateMatching {
      proxy_pass http://flask-server:5000/generateMatching;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Host $host;
      proxy_redirect off;
    }
    location /schema-matching/icons/ {
      alias /usr/share/nginx/html/icons/;
    }
    location /schema-matching/assets/ {
      alias /usr/share/nginx/html/assets/;
    }
}

